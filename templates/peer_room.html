{% extends "base.html" %}

{% block title %}Peer Session - SkillSync{% endblock %}

{% block extra_css %}
<style>
    .meeting-container {
        height: calc(100vh - 80px);
        background: #0f172a;
    }
    .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 1.5rem;
        padding: 2rem;
        height: calc(100% - 100px);
    }
    .video-tile {
        background: #1e293b;
        border-radius: 1.5rem;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.05);
        aspect-ratio: 16/9;
    }
    video {
        width: 100%;
        height: 100%;
        object-cover: cover;
    }
    .controls-bar {
        height: 100px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
    }
    .control-btn {
        width: 50px;
        height: 50px;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #334155;
        color: white;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .control-btn:hover { background: #475569; transform: scale(1.1); }
    .control-btn.active { background: #ef4444; color: white; }
    .control-btn.active:hover { background: #dc2626; }
    
    .user-label {
        position: absolute;
        bottom: 1.5rem;
        left: 1.5rem;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(10px);
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        color: white;
        font-size: 0.8rem;
        font-weight: 600;
        z-index: 10;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
</style>
{% endblock %}

{% block content %}
<div class="meeting-container flex flex-col overflow-hidden">
    <!-- Header info -->
    <div class="px-8 py-4 bg-[#1e293b]/50 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                <i class="fas fa-handshake text-indigo-400"></i>
            </div>
            <div>
                <h1 class="text-white font-bold leading-tight">Live Peer Session</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Collaborating with {{ other_user.name }}</p>
            </div>
        </div>
        <div id="connection-status" class="px-3 py-1 bg-green-500/10 text-green-500 border border-green-500/20 rounded-lg text-xs font-bold">
            Live Session Active
        </div>
    </div>

    <!-- Video Grid with Jitsi iframe -->
    <div class="video-grid flex-1 overflow-hidden p-0 m-0 w-full h-full block">
        <iframe allow="camera; microphone; fullscreen; display-capture; autoplay" src="{{ session.video_link }}" style="height: 100%; width: 100%; border: 0;"></iframe>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar flex-shrink-0">
        <button onclick="endCall()" class="control-btn bg-red-500 hover:bg-red-600 shadow-xl shadow-red-500/20" title="Leave Session">
            <i class="fas fa-phone-slash"></i>
        </button>
        <button onclick="markComplete()" class="control-btn bg-indigo-500 hover:bg-indigo-600 shadow-xl shadow-indigo-500/20 ml-4 font-bold px-4 w-auto rounded-2xl" title="Mark Session Completed">
            Complete Session
        </button>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    async function markComplete() {
        if (!confirm('Mark this session as completed?')) return;
        
        try {
            const res = await fetch('/api/peer/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: {{ session.id }} })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/peer-learning';
            } else {
                alert(data.error);
            }
        } catch(e) {
            alert('Error completing session');
        }
    }

    function endCall() {
        if (confirm('Are you sure you want to leave the session?')) {
            window.location.href = '/peer-learning';
        }
    }
</script>
{% endblock %}
