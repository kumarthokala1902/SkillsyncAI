{% extends "base.html" %}

{% block title %}Login - SkillSync{% endblock %}

{% block extra_css %}
{% endblock %}

{% block guest_content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 opacity-10 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600 rounded-full blur-[120px]"></div>
    </div>

    <div class="max-w-md w-full relative z-10">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400">Sign in to continue your learning journey</p>
        </div>

        <form class="card-dark p-8 rounded-3xl shadow-2xl space-y-6" method="POST">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Email address</label>
                <input id="email" name="email" type="email" required class="w-full transition duration-200" placeholder="name@company.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <input id="password" name="password" type="password" required class="w-full transition duration-200" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center">
                    <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 rounded bg-white/5 border-white/10 text-indigo-500">
                    <label for="remember_me" class="ml-2 text-gray-400">Remember me</label>
                </div>
                <a href="#" class="text-indigo-400 hover:text-indigo-300 font-medium">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition transform hover:-translate-y-0.5 shadow-lg shadow-indigo-500/20">
                Sign In
            </button>

            <div class="text-center pt-4">
                <p class="text-sm text-gray-400">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1">Create one</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
