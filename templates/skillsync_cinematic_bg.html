
<style>
#ss-scene {
  position: relative;
  width: 100%;
  min-height: 560px;
  border-radius: 0; /* Remove radius for hero section */
  overflow: hidden;
  background: #05060f;
  font-family: inherit;
  cursor: default;
  margin: 0;
  padding: 0;
}
#bg-canvas { position:absolute; inset:0; width:100%; height:100%; }
#grid-canvas { position:absolute; inset:0; width:100%; height:100%; opacity:.18; }
#aurora { position:absolute; inset:0; width:100%; height:100%; }

#ss-scene .ss-overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 0;
  pointer-events:none;
  z-index: 10;
}
#ss-scene .ss-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(127,119,221,.9);
  margin-bottom: 14px;
  opacity: 0;
  animation: ssUp .8s ease .4s forwards;
}
#ss-scene .ss-headline {
  font-size: clamp(32px, 8vw, 64px);
  font-weight: 800;
  color: #fff;
  text-align: center;
  line-height: 1.1;
  letter-spacing: -.03em;
  opacity: 0;
  animation: ssUp .9s ease .65s forwards;
  max-width: 800px;
  padding: 0 16px;
}
#ss-scene .ss-headline span {
  background: linear-gradient(90deg, #7F77DD, #5DCAA5, #85B7EB);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200%;
  animation: gradMove 4s ease-in-out infinite;
}
#ss-scene .ss-tagline {
  font-size: 18px;
  color: rgba(255,255,255,.6);
  margin-top: 20px;
  opacity: 0;
  animation: ssUp .9s ease .9s forwards;
  letter-spacing: .01em;
  max-width: 600px;
  text-align: center;
}
#ss-scene .ss-pills {
  display:flex; gap:10px; margin-top:32px; flex-wrap:wrap; justify-content:center;
  opacity:0; animation: ssUp .8s ease 1.1s forwards;
  pointer-events: all;
}
#ss-scene .ss-pill {
  padding: 8px 18px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  transition: all .2s;
}
#ss-scene .ss-pill:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.35); background: rgba(255,255,255,0.05); }
#ss-scene .ss-pill.p1 { background: rgba(127,119,221,.18); color: #AFA9EC; }
#ss-scene .ss-pill.p2 { background: rgba(29,158,117,.15); color: #5DCAA5; }
#ss-scene .ss-pill.p3 { background: rgba(55,138,221,.15); color: #85B7EB; }

#ss-scene .ss-cta {
  margin-top: 40px;
  display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
  opacity:0; animation: ssUp .8s ease 1.3s forwards;
  pointer-events: all;
}
#ss-scene .ss-btn {
  padding: 14px 32px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
#ss-scene .ss-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(127,119,221,0.3); }
#ss-scene .ss-btn:active { transform: scale(.97); }
#ss-scene .ss-btn-primary { background: linear-gradient(135deg, #7F77DD, #534AB7); color:#fff; }
#ss-scene .ss-btn-ghost { background: rgba(255,255,255,.05); color: #fff; border:1px solid rgba(255,255,255,.1); backdrop-filter: blur(10px); }

#ss-scene .ss-stats {
  position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
  display:flex; gap:40px;
  opacity:0; animation: ssUp .8s ease 1.5s forwards;
  z-index:10; pointer-events:none;
  white-space:nowrap;
}
#ss-scene .ss-stat { text-align:center; }
#ss-scene .ss-stat-n { font-size:20px; font-weight:700; color:#fff; }
#ss-scene .ss-stat-l { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; margin-top:4px; }

#ss-scene .ss-corner {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  z-index:12; pointer-events:none;
  opacity:0; animation: ssDown .7s ease .2s forwards;
}
#ss-scene .ss-logo-dot {
  width:32px; height:32px; border-radius:10px;
  background: linear-gradient(135deg, #7F77DD, #5DCAA5);
  display:flex; align-items:center; justify-content:center;
}
#ss-scene .ss-logo-inner { width:12px; height:12px; border-radius:4px; background:#fff; }
#ss-scene .ss-logo-text { font-size:16px; font-weight:700; color:white; letter-spacing:.05em; }

#ss-scene .ss-live-badge {
  position:absolute; top:24px; right:24px;
  display:flex; align-items:center; gap:8px;
  background:rgba(29,158,117,.15); border:1px solid rgba(29,158,117,0.3);
  border-radius:99px; padding:6px 14px;
  font-size:12px; color:#5DCAA5; font-weight:600;
  z-index:12;
  opacity:0; animation: ssDown .7s ease .3s forwards;
}
#ss-scene .live-dot {
  width:8px; height:8px; border-radius:50%; background:#5DCAA5;
  animation: livePulse 1.4s ease-in-out infinite;
}

@keyframes ssUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
@keyframes ssDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
@keyframes gradMove { 0%,100%{background-position:0%;} 50%{background-position:100%;} }
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1);box-shadow: 0 0 0 rgba(93,202,165,0.4);} 50%{opacity:.5;transform:scale(.7);box-shadow: 0 0 10px rgba(93,202,165,0.8);} }
@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(600px); }
}
#ss-scene .ss-scanline {
  position:absolute; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(127,119,221,.3), rgba(93,202,165,.2), transparent);
  animation: scanline 6s linear infinite;
  z-index:9; pointer-events:none;
}
</style>

<div id="ss-scene">
  <canvas id="bg-canvas"></canvas>
  <canvas id="grid-canvas"></canvas>

  <div class="ss-scanline"></div>

  <div class="ss-corner">
    <div class="ss-logo-dot"><div class="ss-logo-inner"></div></div>
    <span class="ss-logo-text">SkillSync</span>
  </div>
  <div class="ss-live-badge">
    <div class="live-dot"></div>
    Live sessions active
  </div>

  <div class="ss-overlay">
    <div class="ss-eyebrow">AI-powered skill platform</div>
    <div class="ss-headline">Learn. Verify. <span>Grow together.</span></div>
    <div class="ss-tagline">Connect with peers. Master skills. Track your progress in real time.</div>
    <div class="ss-pills">
      <a href="{{ url_for('progress') }}" class="ss-pill p1" style="text-decoration:none">Skill verification</a>
      <a href="{{ url_for('peer_learning') }}" class="ss-pill p2" style="text-decoration:none">Peer matching</a>
      <a href="{{ url_for('live_learning') }}" class="ss-pill p3" style="text-decoration:none">Live learning</a>
    </div>
    <div class="ss-cta">
      <a href="{{ url_for('register') }}" class="ss-btn ss-btn-primary">Get started free</a>
      <a href="{{ url_for('peer_learning') }}" class="ss-btn ss-btn-ghost">See how it works</a>
    </div>
  </div>

  <div class="ss-stats">
    <div class="ss-stat"><div class="ss-stat-n">120k+</div><div class="ss-stat-l">Learners</div></div>
    <div class="ss-stat"><div class="ss-stat-n">4.9</div><div class="ss-stat-l">Rating</div></div>
    <div class="ss-stat"><div class="ss-stat-n">340+</div><div class="ss-stat-l">Skills</div></div>
    <div class="ss-stat"><div class="ss-stat-n">98%</div><div class="ss-stat-l">Match rate</div></div>
  </div>
</div>

<script>
(function(){
  const scene = document.getElementById('ss-scene');
  const W = scene.offsetWidth || 700;
  const H = 560;

  const bgC = document.getElementById('bg-canvas');
  bgC.width = W; bgC.height = H;
  const ctx = bgC.getContext('2d');

  const gridC = document.getElementById('grid-canvas');
  gridC.width = W; gridC.height = H;
  const gctx = gridC.getContext('2d');

  let mouse = { x: W/2, y: H/2 };
  scene.addEventListener('mousemove', e => {
    const r = scene.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });

  function drawGrid() {
    gctx.clearRect(0,0,W,H);
    const size = 44;
    gctx.strokeStyle = 'rgba(127,119,221,0.25)';
    gctx.lineWidth = 0.5;
    for(let x=0;x<=W;x+=size){
      gctx.beginPath(); gctx.moveTo(x,0); gctx.lineTo(x,H); gctx.stroke();
    }
    for(let y=0;y<=H;y+=size){
      gctx.beginPath(); gctx.moveTo(0,y); gctx.lineTo(W,y); gctx.stroke();
    }
  }
  drawGrid();

  const COLORS = [
    {r:127,g:119,b:221},
    {r:29,g:158,b:117},
    {r:55,g:138,b:221},
    {r:216,g:90,b:48},
    {r:99,g:153,b:34},
  ];

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random()*W;
      this.y = init ? Math.random()*H : H+10;
      this.r = 1 + Math.random()*2.2;
      const c = COLORS[Math.floor(Math.random()*COLORS.length)];
      this.color = c;
      this.alpha = 0.15 + Math.random()*0.55;
      this.vx = (Math.random()-.5)*0.35;
      this.vy = -(0.25 + Math.random()*0.6);
      this.life = 0;
      this.maxLife = 180 + Math.random()*220;
      this.pulse = Math.random()*Math.PI*2;
      this.pulseSpeed = 0.025 + Math.random()*0.04;
    }
    update() {
      this.pulse += this.pulseSpeed;
      const mx = (mouse.x - this.x) * 0.00008;
      const my = (mouse.y - this.y) * 0.00006;
      this.vx += mx; this.vy += my;
      this.vx *= 0.98; this.vy *= 0.99;
      this.x += this.vx; this.y += this.vy;
      this.life++;
      if(this.life > this.maxLife || this.y < -10) this.reset(false);
    }
    draw(c) {
      const a = this.alpha * Math.min(1, this.life/30) * Math.min(1,(this.maxLife-this.life)/30);
      const rPulse = this.r * (1 + 0.3*Math.sin(this.pulse));
      c.beginPath();
      c.arc(this.x, this.y, rPulse, 0, Math.PI*2);
      c.fillStyle = `rgba(${this.color.r},${this.color.g},${this.color.b},${a})`;
      c.fill();
    }
  }

  class Orb {
    constructor(x,y,r,c,speed) {
      this.ox=x; this.oy=y; this.r=r; this.c=c; this.speed=speed;
      this.t=Math.random()*Math.PI*2;
      this.ax=60+Math.random()*80; this.ay=40+Math.random()*60;
    }
    update() { this.t+=this.speed; }
    draw(c) {
      const x = this.ox + Math.sin(this.t)*this.ax;
      const y = this.oy + Math.cos(this.t*0.7)*this.ay;
      const mx = (mouse.x - x)*0.04;
      const my = (mouse.y - y)*0.04;
      const grd = c.createRadialGradient(x+mx,y+my,0,x+mx,y+my,this.r);
      grd.addColorStop(0,`rgba(${this.c.r},${this.c.g},${this.c.b},0.18)`);
      grd.addColorStop(0.5,`rgba(${this.c.r},${this.c.g},${this.c.b},0.06)`);
      grd.addColorStop(1,`rgba(${this.c.r},${this.c.g},${this.c.b},0)`);
      c.beginPath(); c.arc(x+mx,y+my,this.r,0,Math.PI*2);
      c.fillStyle=grd; c.fill();
    }
  }

  class Connector {
    constructor(p1,p2) { this.p1=p1; this.p2=p2; this.alpha=0; }
    draw(c) {
      const dx=this.p1.x-this.p2.x, dy=this.p1.y-this.p2.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>130) return;
      const a = (1-dist/130)*0.15;
      const col = this.p1.color;
      c.beginPath();
      c.moveTo(this.p1.x,this.p1.y);
      c.lineTo(this.p2.x,this.p2.y);
      c.strokeStyle=`rgba(${col.r},${col.g},${col.b},${a})`;
      c.lineWidth=0.6; c.stroke();
    }
  }

  const particles = Array.from({length:90},()=>new Particle());
  const orbs = [
    new Orb(W*0.2, H*0.3, 200, {r:127,g:119,b:221}, 0.004),
    new Orb(W*0.8, H*0.6, 180, {r:29,g:158,b:117},  0.005),
    new Orb(W*0.5, H*0.15,160, {r:55,g:138,b:221},  0.006),
    new Orb(W*0.7, H*0.15,140, {r:216,g:90,b:48},   0.003),
    new Orb(W*0.1, H*0.75,150, {r:99,g:153,b:34},   0.0045),
  ];

  let frame = 0;

  function drawAurora(c, t) {
    const auroras = [
      {cx:W*0.25, cy:H*0.4, rx:W*0.45, ry:H*0.28, r:127,g:119,b:221, phase:0},
      {cx:W*0.75, cy:H*0.55,rx:W*0.4,  ry:H*0.22, r:29,g:158,b:117, phase:1.5},
      {cx:W*0.5,  cy:H*0.2, rx:W*0.35, ry:H*0.18, r:55,g:138,b:221, phase:3},
    ];
    auroras.forEach(a => {
      const ox = Math.sin(t*0.4+a.phase)*30;
      const oy = Math.cos(t*0.3+a.phase)*20;
      const grd = c.createRadialGradient(a.cx+ox,a.cy+oy,0,a.cx+ox,a.cy+oy,Math.max(a.rx,a.ry));
      grd.addColorStop(0,`rgba(${a.r},${a.g},${a.b},0.09)`);
      grd.addColorStop(0.5,`rgba(${a.r},${a.g},${a.b},0.03)`);
      grd.addColorStop(1,`rgba(${a.r},${a.g},${a.b},0)`);
      c.save();
      c.translate(a.cx+ox,a.cy+oy);
      c.scale(a.rx/Math.max(a.rx,a.ry),a.ry/Math.max(a.rx,a.ry));
      c.beginPath(); c.arc(0,0,Math.max(a.rx,a.ry),0,Math.PI*2);
      c.fillStyle=grd; c.fill();
      c.restore();
    });
  }

  function loop() {
    frame++;
    const t = frame * 0.016;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#05060f';
    ctx.fillRect(0,0,W,H);

    drawAurora(ctx,t);
    orbs.forEach(o=>{o.update();o.draw(ctx);});
    particles.forEach(p=>{p.update();p.draw(ctx);});

    const active = particles.filter(p=>p.life>0&&p.life<p.maxLife);
    for(let i=0;i<active.length;i++){
      for(let j=i+1;j<Math.min(i+8,active.length);j++){
        const conn = new Connector(active[i],active[j]);
        conn.draw(ctx);
      }
    }

    const mx = mouse.x, my = mouse.y;
    const mgrd = ctx.createRadialGradient(mx,my,0,mx,my,120);
    mgrd.addColorStop(0,'rgba(127,119,221,0.07)');
    mgrd.addColorStop(1,'rgba(127,119,221,0)');
    ctx.beginPath(); ctx.arc(mx,my,120,0,Math.PI*2);
    ctx.fillStyle=mgrd; ctx.fill();

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
